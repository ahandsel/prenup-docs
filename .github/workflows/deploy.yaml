# .github/workflows/deploy.yaml
# Build and deploy a VitePress site to GitHub Pages
# Triggered on pushes to the main branch or "Run workflow" button

name: Deploy VitePress site to GitHub Pages

on:
  workflow_dispatch: {} # Allow manual execution from the GitHub Actions tab
  push:
    branches: [main] # Run this workflow only for commits to `main`

permissions:
  contents: read
  pages: write
  id-token: write

# Ensures that only one deploy runs at a time for this project
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build and upload job
  build:
    name: Build and upload VitePress site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Step 1: Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0, pinned
        with:
          fetch-depth: 0
      # Step 2: Detect pnpm version from package.json
      - name: Detect pnpm version
        id: pnpm-version
        run: |
          version="$(jq -r '.packageManager' package.json | cut -d'@' -f2)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Step 3: Install pnpm package manager (use detected version)
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # pnpm/action-setup@v6.0.9, pinned
        with:
          version: ${{ steps.pnpm-version.outputs.version }}

      # Step 4: Setup Node.js (required by pnpm and VitePress)
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0, pinned
        with:
          node-version: 24 # Use Node.js v24 as specified by vitepress.dev
          cache: pnpm

      # Step 5: Install project dependencies
      - name: Install dependencies
        run: pnpm install

      # Step 6: Build the VitePress site
      - name: Build VitePress site
        run: pnpm build

      # Step 7: Prepare artifact for GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # actions/configure-pages@v6.0.0, pinned

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # actions/upload-pages-artifact@v5.0.0, pinned
        with:
          path: contents/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # actions/deploy-pages@v5.0.0, pinned
